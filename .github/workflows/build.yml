name: 🤖 The Tech Brief V3 — Intelligence Build

on:
  schedule:
    # Deep-dive article generation: daily 05:00 UTC
    - cron: "0 5 * * *"
    # RSS rebuild + intelligence rewrites: every 6 hours
    - cron: "0 */6 * * *"
  push:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      skip_generate:
        description: "Skip deep-dive generation"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      content_engine:
        description: "Run content engine plan (generates 10 AdSense articles)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

# ════════════════════════════════════════════════════════════════════
# JOB 1 — CONTENT ENGINE (manual / weekly)
# Runs: manual dispatch with content_engine=true
# Generates high-quality AdSense articles via intelligence pipeline
# ════════════════════════════════════════════════════════════════════
jobs:
  content-engine:
    name: Run AdSense Content Engine
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.content_engine == 'true'

    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0, token: "${{ secrets.GITHUB_TOKEN }}" }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run content engine (10 articles from plan)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_DAILY_CAP: "15"
        run: |
          echo "=== Content Engine — AdSense Article Generator ==="
          python scripts/run_content_engine.py plan --max 10 --priority 1

      - name: Show site readiness report
        run: python scripts/run_content_engine.py site-report

      - name: Commit generated articles
        run: |
          git config user.name "Tech Brief Bot"
          git config user.email "technodate3@gmail.com"
          git add docs/articles/ data/generated_articles.json data/article_cache_v3.json data/content_engine.log
          if git diff --cached --quiet; then
            echo "No new articles generated."
          else
            git commit -m "✍️ AdSense content engine — $(date -u '+%Y-%m-%d') [skip ci]"
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════
  # JOB 2 — GENERATE DEEP-DIVE ARTICLES (daily)
  # ════════════════════════════════════════════════════════════════════
  generate:
    name: Generate AI Deep-Dive Articles
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_generate != 'true' && github.event.inputs.content_engine != 'true')
    outputs:
      ran: "true"

    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0, token: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"

      - name: Generate 9 deep-dive articles
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_articles.py

      - name: Commit generated articles
        run: |
          git config user.name "Tech Brief Bot"
          git config user.email "technodate3@gmail.com"
          git add site/articles/ data/generated_articles.json site/assets/data/trending.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new deep-dive articles today."
          else
            git commit -m "🤖 Deep-dive articles — $(date -u '+%Y-%m-%d') [skip ci]"
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════
  # JOB 3 — BUILD SITE (every 6h)
  # ════════════════════════════════════════════════════════════════════
  build:
    name: Build & Deploy Site (V3 Intelligence)
    runs-on: ubuntu-latest
    needs: [generate]
    if: always()

    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0, token: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"

      - name: Build site — V3 Intelligence Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "=== The Tech Brief V3 — Site Builder ==="
          python scripts/build.py
          test -f docs/index.html  || (echo "ERROR: index.html missing"  && exit 1)
          test -f docs/sitemap.xml || (echo "ERROR: sitemap.xml missing" && exit 1)

      - name: Commit site output
        run: |
          git config user.name "Tech Brief Bot"
          git config user.email "technodate3@gmail.com"
          git add docs/ data/article_cache.json
          if git diff --cached --quiet; then
            echo "No site changes."
          else
            git commit -m "chore: V3 site build — $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin main
          fi

      - name: Build summary
        if: always()
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "  The Tech Brief V3 — Build Complete"
          echo "  $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "  HTML pages   : $(find docs -maxdepth 1 -name '*.html' | wc -l)"
          echo "  Article pages: $(find docs/articles -name '*.html' 2>/dev/null | wc -l)"
          echo "  Sitemap URLs : $(grep -c '<loc>' docs/sitemap.xml 2>/dev/null || echo 0)"
          echo "╚══════════════════════════════════════════════╝"
