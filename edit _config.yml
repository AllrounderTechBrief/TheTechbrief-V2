defaults:
  - scope:
      path: ""
    values:
      headers:
        Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
        X-Content-Type-Options: "nosniff"
        Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
        Referrer-Policy: "no-referrer"
        Permissions-Policy: "accelerometer=(), geolocation=(), microphone=()"
